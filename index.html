<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MSquare - Master Coding</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            fontSize: {
              'sm': '0.925rem',
              'base': '1.05rem',
              'lg': '1.175rem',
              'xl': '1.35rem',
              '2xl': '1.6rem',
            },
            colors: {
              primary: {
                DEFAULT: '#4f46e5',
                50: '#eef2ff',
                100: '#e0e7ff',
                500: '#6366f1',
                600: '#4f46e5',
                700: '#4338ca',
                900: '#312e81',
                300: '#a5b4fc', 
              },
              success: {
                DEFAULT: '#059669',
                50: '#ecfdf5',
                100: '#d1fae5',
                500: '#10b981',
                600: '#059669',
                900: '#064e3b',
              },
              dark: {
                bg: '#0f172a',
                card: '#1e293b',
                border: '#334155',
                surface: '#020617',
              }
            },
            animation: {
              'shimmer': 'shimmer 2s linear infinite',
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              shimmer: {
                '0%': { backgroundPosition: '-200% 0' },
                '100%': { backgroundPosition: '200% 0' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
      .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; border: 2px solid transparent; background-clip: content-box; }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #475569; }
      
      .shimmer-bg {
        background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
        background-size: 200% 100%;
        animation: shimmer 2s infinite;
      }
      
      /* Apple Glass Theme Overrides */
      .theme-glass body {
        background: linear-gradient(135deg, #f0f4ff 0%, #dbeafe 50%, #e0e7ff 100%);
        background-attachment: fixed;
      }
      
      .theme-glass.dark body {
        background: linear-gradient(135deg, #0f172a 0%, #172554 50%, #020617 100%);
        background-image: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.4) 0%, transparent 40%),
                          radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.4) 0%, transparent 40%);
        background-attachment: fixed;
      }
      
      .theme-glass .bg-white,
      .theme-glass .glass-container,
      .theme-glass .glass-panel {
        background-color: rgba(255, 255, 255, 0.25) !important;
        backdrop-filter: blur(40px) saturate(250%) !important;
        -webkit-backdrop-filter: blur(40px) saturate(250%) !important;
        border: 1px solid rgba(255, 255, 255, 0.5) !important;
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1) !important;
      }
      
      .theme-glass.dark .dark\:bg-dark-card,
      .theme-glass.dark .glass-container,
      .theme-glass.dark .glass-panel,
      .theme-glass .dark .bg-white {
        background-color: rgba(15, 23, 42, 0.2) !important;
        backdrop-filter: blur(40px) saturate(250%) !important;
        -webkit-backdrop-filter: blur(40px) saturate(250%) !important;
        border: 1px solid rgba(255, 255, 255, 0.15) !important;
        border-top: 1px solid rgba(255, 255, 255, 0.3) !important;
        border-left: 1px solid rgba(255, 255, 255, 0.3) !important;
        box-shadow: 0 12px 48px 0 rgba(0, 0, 0, 0.4) !important;
      }
      
      .theme-glass .glass-button {
        background-color: rgba(255, 255, 255, 0.3) !important;
        backdrop-filter: blur(20px) saturate(200%) !important;
        border: 1px solid rgba(255, 255, 255, 0.4) !important;
        box-shadow: 0 2px 8px rgba(31, 38, 135, 0.05) !important;
      }
      
      .theme-glass.dark .glass-button {
        background-color: rgba(255, 255, 255, 0.1) !important;
        backdrop-filter: blur(20px) saturate(200%) !important;
        border: 1px solid rgba(255, 255, 255, 0.15) !important;
        border-top: 1px solid rgba(255, 255, 255, 0.3) !important;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3) !important;
      }

      @keyframes blob {
        0% { transform: translate(0px, 0px) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
        100% { transform: translate(0px, 0px) scale(1); }
      }
      .animate-blob {
        animation: blob 15s infinite alternate ease-in-out;
      }
      .animation-delay-2000 {
        animation-delay: 2s;
      }
      .animation-delay-4000 {
        animation-delay: 4s;
      }
    </style>
  <script type="importmap">
{
  "imports": {

  }
}
</script>

</html>
