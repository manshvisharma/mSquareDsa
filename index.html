<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MSquare - Master Coding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            fontSize: {
              // Scaling up base sizes slightly
              'sm': '0.925rem',
              'base': '1.05rem',
              'lg': '1.175rem',
              'xl': '1.35rem',
              '2xl': '1.6rem',
            },
            colors: {
              // Sharper Primary - Lighter in dark mode for visibility
              primary: {
                DEFAULT: '#4f46e5', // Indigo 600
                50: '#eef2ff',
                100: '#e0e7ff',
                500: '#6366f1',
                600: '#4f46e5',
                700: '#4338ca',
                900: '#312e81',
                // Specialized for dark mode text
                300: '#a5b4fc', 
              },
              // Vibrant Success
              success: {
                DEFAULT: '#059669', // Emerald 600
                50: '#ecfdf5',
                100: '#d1fae5',
                500: '#10b981',
                600: '#059669',
                900: '#064e3b',
              },
              // Deep Dark Theme (Less Blue, More Slate/Black)
              dark: {
                bg: '#0f172a', // Slate 900
                card: '#1e293b', // Slate 800
                border: '#334155', // Slate 700
                surface: '#020617', // Slate 950
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
      /* Custom Scrollbar for Sidebar */
      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #cbd5e1;
        border-radius: 20px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #475569;
      }
    </style>

}
